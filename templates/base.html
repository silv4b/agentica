<!doctype html>
<html lang="pt-BR" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% block title %}Agentica - Gerador de AGENTS.md{% endblock %}
    </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    <style>
      :root {
        --bg: #ffffff;
        --bg-nav: #ffffff;
        --bg-card: #ffffff;
        --bg-subtle: #f9fafb;
        --bg-hover: #f3f4f6;
        --bg-input: #ffffff;
        --text-primary: #111827;
        --text-secondary: #4b5563;
        --text-muted: #9ca3af;
        --border: #e5e7eb;
        --border-hover: #9ca3af;
      }
      [data-theme="dark"] {
        --bg: #0d1117;
        --bg-nav: #161b22;
        --bg-card: #161b22;
        --bg-subtle: #161b22;
        --bg-hover: #1c2128;
        --bg-input: #0d1117;
        --text-primary: #e6edf3;
        --text-secondary: #8b949e;
        --text-muted: #6e7681;
        --border: #30363d;
        --border-hover: #8b949e;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica,
          Arial, sans-serif;
        background-color: var(--bg);
        color: var(--text-primary);
      }
      pre {
        font-size: 13px !important;
        line-height: 1.45;
        background: #282c34 !important;
        overflow-x: auto;
        max-width: 100%;
      }
      code {
        font-size: 13px;
      }
      .hljs {
        background: #282c34 !important;
        color: #abb2bf;
        word-wrap: normal;
        white-space: pre;
      }
      .hljs-comment {
        color: #6f8098;
      }
      .hljs-string {
        color: #98c379;
      }
      .hljs-keyword {
        color: #c678dd;
      }
      .hljs-built_in {
        color: #e6c07b;
      }
      .hljs-name {
        color: #e06c75;
      }
      .bg-theme {
        background-color: var(--bg);
      }
      .bg-nav {
        background-color: var(--bg-nav);
      }
      .bg-card {
        background-color: var(--bg-card);
      }
      .bg-subtle {
        background-color: var(--bg-subtle);
      }
      .bg-hover:hover {
        background-color: var(--bg-hover);
      }
      .bg-input {
        background-color: var(--bg-input);
      }
      .text-primary {
        color: var(--text-primary);
      }
      .text-secondary {
        color: var(--text-secondary);
      }
      .text-muted {
        color: var(--text-muted);
      }
      .border-theme {
        border-color: var(--border);
      }
      .border-hover:hover {
        border-color: var(--border-hover);
      }
    </style>
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <nav class="border-b border-theme sticky top-0 bg-nav z-50">
      <div class="max-w-5xl mx-auto px-4">
        <div class="flex justify-between h-14">
          <div class="flex items-center">
            <a
              href="{% url 'index' %}"
              class="text-base font-semibold text-primary"
              >Agentica</a
            >
          </div>
          <div class="flex items-center space-x-3">
            <button
              id="theme-toggle"
              class="w-8 h-8 flex items-center justify-center rounded hover:bg-hover text-secondary"
              title="Alternar tema"
            >
              <svg
                id="sun-icon"
                class="w-4 h-4 hidden"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
                />
              </svg>
              <svg
                id="moon-icon"
                class="w-4 h-4"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
              </svg>
            </button>
            <a
              href="https://github.com/silv4b/agentica"
              target="_blank"
              class="text-sm text-secondary hover:text-primary flex items-center space-x-1"
            >
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                <path
                  fill-rule="evenodd"
                  clip-rule="evenodd"
                  d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0012 2z"
                />
              </svg>
              <span>Github</span>
            </a>
          </div>
        </div>
      </div>
    </nav>

    <div class="max-w-5xl mx-auto">{% block content %}{% endblock %}</div>

    <footer class="border-t border-theme mt-12">
      <div class="max-w-5xl mx-auto px-4 py-6">
        <p class="text-sm text-muted text-center">
          Agentica — Gere AGENTS.md para seus projetos
        </p>
      </div>
    </footer>
    {% block extra_body %}{% endblock %}
    <script>
      (function () {
        var theme = localStorage.getItem("agentica-theme") || "light";
        document.documentElement.setAttribute("data-theme", theme);
        var sun = document.getElementById("sun-icon");
        var moon = document.getElementById("moon-icon");
        if (theme === "dark") {
          sun.classList.remove("hidden");
          moon.classList.add("hidden");
        } else {
          sun.classList.add("hidden");
          moon.classList.remove("hidden");
        }
      })();
      document.addEventListener("DOMContentLoaded", function () {
        var btn = document.getElementById("theme-toggle");
        if (!btn) return;
        btn.addEventListener("click", function () {
          var html = document.documentElement;
          var current = html.getAttribute("data-theme");
          var next = current === "dark" ? "light" : "dark";
          html.setAttribute("data-theme", next);
          localStorage.setItem("agentica-theme", next);
          var sun = document.getElementById("sun-icon");
          var moon = document.getElementById("moon-icon");
          if (next === "dark") {
            sun.classList.remove("hidden");
            moon.classList.add("hidden");
          } else {
            sun.classList.add("hidden");
            moon.classList.remove("hidden");
          }
        });
      });
    </script>
  </body>
</html>
