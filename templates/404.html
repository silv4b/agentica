{% extends 'base.html' %}
{% load static %}
{% block title %}Página não encontrada - Agentica{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] px-4 py-16">
    <div class="bg-card border border-theme rounded-lg p-8 max-w-md w-full text-center">
        <div class="mb-6">
            <svg class="w-20 h-20 mx-auto text-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10"/>
                <path d="M16 16s-1.5-2-4-2-4 2-4 2" stroke-linecap="round"/>
                <path d="M9 9h.01M15 9h.01" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
            </svg>
        </div>
        <h1 class="text-6xl font-bold text-primary mb-2">404</h1>
        <p class="text-lg text-secondary mb-6">Página não encontrada</p>
        <p class="text-sm text-muted mb-8">
            A rota que você tentou acessar não existe ou foi movida.
        </p>
        <a href="{% url 'index' %}" class="inline-flex items-center gap-2 px-4 py-2 text-sm border border-theme rounded border-hover focus:outline-none bg-subtle text-secondary hover:text-primary transition-colors">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-linecap="round"/>
            </svg>
            Voltar ao início
        </a>
    </div>
</div>
{% endblock %}
